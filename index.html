<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Загрузка...</title>
    
    <!-- Предварительно загружаем фоновый звук для современных браузеров и IE -->
    <bgsound id="xp-sound" src="scream.mp3" loop="-1" volume="-10000">

    <style type="text/css">
        body, html {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }

        /* Таблица для жесткого центрирования в старых IE6/IE7 */
        #main-table {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0px;
            left: 0px;
            z-index: 10;
        }

        /* Серый баннер в классическом стиле окон Windows XP */
        #cookie-banner {
            width: 380px;
            background-color: #D4D0C8;
            color: #000000;
            padding: 20px;
            border: 2px solid #FFFFFF;
            text-align: center;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            font-size: 13px;
        }

        /* Окно ошибки, если это Internet Explorer */
        #ie-warning {
            display: none;
            width: 400px;
            background-color: #110000;
            color: #ff3333;
            padding: 20px;
            border: 2px dashed #ff3333;
            text-align: center;
            font-family: Tahoma, sans-serif;
            font-size: 13px;
        }

        .cookie-text {
            font-weight: bold;
            margin-bottom: 15px;
            color: #000000;
        }

        .cookie-btn {
            padding: 4px 15px;
            font-family: Tahoma, sans-serif;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100px;
            margin: 0px 5px;
        }

        /* Полноэкранный блок для Джеффа */
        #screamer-overlay {
            display: none;
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            height: 100%;
            z-index: 9999;
        }

        #screamer-img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Слой со скримером (ваша гифка) -->
    <div id="screamer-overlay">
        <img src="jeff.gif" id="screamer-img" alt="">
    </div>

    <!-- Ретро-таблица центрирования баннера и ошибок -->
    <table id="main-table" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" valign="middle">
                
                <!-- Стандартный баннер Cookie -->
                <div id="cookie-banner">
                    <div class="cookie-text">Разрешить сайту использовать файлы cookie?</div>
                    <input type="button" class="cookie-btn" value="Применить" onclick="runScreamer();">
                    <input type="button" class="cookie-btn" value="Отклонить" onclick="runScreamer();">
                </div>

                <!-- Заглушка, которая включится только в Internet Explorer -->
                <div id="ie-warning">
                    <b style="font-size: 15px;">Ошибка совместимости</b><br><br>
                    Данный интерактивный скрипт (скример) больше не поддерживается в браузере Internet Explorer.<br><br>
                    <span style="color: #888;">Пожалуйста, используйте современный браузер.</span>
                </div>

            </td>
        </tr>
    </table>

    <audio id="modern-sound" src="scream.mp3" loop="loop"></audio>

    <script type="text/javascript">
        var isScreamerRunning = false;
        var strobeState = false;
        var isIE = false;

        // ПРОВЕРКА НА IE (совместимая со старыми стандартами Windows XP)
        var ua = window.navigator.userAgent;
        if (ua.indexOf('MSIE ') > -1 || ua.indexOf('Trident/') > -1) {
            isIE = true;
            // Прячем кнопки и выводим ошибку для IE
            document.getElementById('cookie-banner').style.display = 'none';
            document.getElementById('ie-warning').style.display = 'block';
        }

        // Старый JavaScript-стробоскоп
        function doStrobe() {
            if (!isScreamerRunning) return;
            strobeState = !strobeState;
            document.body.style.backgroundColor = strobeState ? "#FF0000" : "#FFFFFF";
            setTimeout("doStrobe()", 40); 
        }

        function runScreamer() {
            // Если открыто в Internet Explorer — полностью блокируем запуск
            if (isIE || isScreamerRunning) return;
            isScreamerRunning = true;

            // Запрос полноэкранного режима для современных браузеров
            var el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();

            // Скрываем таблицу, показываем гифку
            document.getElementById('main-table').style.display = 'none';
            document.getElementById('screamer-overlay').style.display = 'block';
            document.body.style.cursor = 'none';

            // Воспроизведение звука (для обычных браузеров)
            var modernSound = document.getElementById('modern-sound');
            if (modernSound && modernSound.play) {
                modernSound.play();
            }

            // Воспроизведение звука (если это старый движок не-IE, например старая Opera на XP)
            var xpSound = document.getElementById('xp-sound');
            if (xpSound) {
                xpSound.volume = 0;
            }

            doStrobe();
        }

        // ЗАЩИТА ПРИ ВЫХОДЕ (Крестик / Alt+F4)
        window.onbeforeunload = function() {
            if (isScreamerRunning && !isIE) {
                return "Ты затроллен!";
            }
        };

        // ЗАЩИТА ОТ ESC
        if (document.addEventListener) {
            var handleEsc = function() {
                var isFull = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
                if (!isFull && isScreamerRunning && !isIE) {
                    document.body.style.cursor = 'default';
                    alert("Ты затроллен!");
                    var el = document.documentElement;
                    if (el.requestFullscreen) el.requestFullscreen();
                    document.body.style.cursor = 'none';
                }
            };
            document.addEventListener('fullscreenchange', handleEsc);
            document.addEventListener('webkitfullscreenchange', handleEsc);
            document.addEventListener('mozfullscreenchange', handleEsc);
        }
    </script>

</body>
</html>
